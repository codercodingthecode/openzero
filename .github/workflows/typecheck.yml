name: typecheck

on:
  # push:
  #   branches: [dev]
  # pull_request:
  #   branches: [dev]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: [self-hosted, linux, x64, docker, lab]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run typecheck
        run: bun typecheck
